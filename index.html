<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniTech Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a; /* Slate 900 */
        color: #f8fafc; /* Slate 50 */
        overflow: hidden; /* Prevent scroll on zoom */
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Line Flow Animation */
      @keyframes dash-flow {
        to {
          stroke-dashoffset: -24;
        }
      }
      
      .animate-dash {
        animation: dash-flow 1s linear infinite;
      }

      @keyframes scan {
        0% { transform: translateY(0); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(300px); opacity: 0; }
      }

      /* Joyride Smooth Transitions */
      .react-joyride__overlay {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }

      @keyframes border-dance {
        0% { background-position: 0 0, 0 100%, 0 100%, 100% 0; }
        100% { background-position: 24px 0, -24px 100%, 0 -24px, 100% 24px; }
      }

      .react-joyride__spotlight {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        background-image: linear-gradient(90deg, #3b82f6 50%, transparent 50%), 
                          linear-gradient(90deg, #3b82f6 50%, transparent 50%), 
                          linear-gradient(0deg, #3b82f6 50%, transparent 50%), 
                          linear-gradient(0deg, #3b82f6 50%, transparent 50%) !important;
        background-repeat: repeat-x, repeat-x, repeat-y, repeat-y !important;
        background-size: 12px 2px, 12px 2px, 2px 12px, 2px 12px !important;
        animation: border-dance 1s infinite linear !important;
      }

      /* Manual Fade Out/In via Body Class */
      body.tour-transitioning .react-joyride__overlay,
      body.tour-transitioning .react-joyride__spotlight,
      body.tour-transitioning .react-joyride__tooltip {
        opacity: 0 !important;
        pointer-events: none !important;
      }

      /* Ensure tooltip also has transition */
      .react-joyride__tooltip {
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }
    </style>
